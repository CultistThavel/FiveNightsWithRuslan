<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ruslan Horror - Mobile Optimized</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #111; overflow: hidden;
            font-family: 'Press Start 2P', cursive; user-select: none;
            display: flex; justify-content: center; align-items: center;
        }

        /* Ограничиваем игровое поле, чтобы фон влезал целиком */
        #game-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: black;
            overflow: hidden;
            border: 2px solid #333;
        }

        #disclaimer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: white; display: flex;
            justify-content: center; align-items: center; text-align: center;
            z-index: 2000; cursor: pointer; padding: 20px; box-sizing: border-box;
            font-size: 12px; line-height: 1.6;
        }

        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none;
        }

        #office-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain; /* ЧТОБЫ ВЛЕЗАЛО ЦЕЛИКОМ */
            background-position: center;
            background-repeat: no-repeat;
        }

        /* КНОПКА DOOR УМЕНЬШЕНА В 4 РАЗА */
        #door-btn {
            position: absolute; top: 45%; left: 5%;
            width: 50px; height: 50px; /* Было ~200px (на глаз по скринам), стало 50px */
            background: rgba(255, 0, 0, 0.5);
            border: 2px solid white; color: white; cursor: pointer;
            z-index: 100; display: flex; justify-content: center; align-items: center;
            font-size: 8px; border-radius: 5px;
        }

        #tablet-toggle {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 40%; height: 60px; background: rgba(255, 0, 0, 0.4);
            border: 2px solid black; cursor: pointer; z-index: 500;
            display: flex; justify-content: center; align-items: center;
        }
        #tablet-toggle span { color: black; font-size: 30px; }

        /* ПЛАНШЕТ */
        #tablet-container {
            position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70%;
            background-image: url('https://www.dropbox.com/scl/fi/1v8mb449dwf8dk9t5zj72/Picsart_26-03-02_21-03-49-458.png?rlkey=1zlecuityjxft1h8o6bky8r1p&st=palmnkk2&raw=1');
            background-size: 100% 100%; transition: bottom 0.3s ease-in-out; z-index: 400;
        }
        #tablet-container.open { bottom: 80px; }

        #tablet-ui {
            position: absolute; top: 15%; left: 10%; width: 80%; height: 70%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; text-align: center; pointer-events: none;
        }
        #t-date { font-size: 8px; margin-bottom: 10px; }
        #t-time { font-size: 40px; margin-bottom: 10px; }
        #t-power { font-size: 10px; }

        /* СКРИМЕР И КОНЦЫ */
        #screamer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.dropbox.com/scl/fi/gfrq4h9jmtmfigo6zngp7/Picsart_26-03-02_19-57-24-208.jpg?rlkey=f76rc2zyarz530o6za1fxey8b&st=m6irds1l&raw=1');
            background-size: 100% 100%; z-index: 9999; display: none;
        }
        .shake { animation: shake 0.05s infinite; }
        @keyframes shake { 0% { transform: translate(5px,5px); } 50% { transform: translate(-5px,-5px); } }

        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: white; z-index: 10000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; font-size: 14px; padding: 20px;
        }
    </style>
</head>
<body>

<div id="game-viewport">
    <div id="disclaimer"><span id="disc-text" style="display:none">Нажмите, чтобы начать...</span></div>

    <div id="game-container">
        <div id="office-bg"></div>
        <div id="door-btn">DOOR</div>
        <div id="tablet-toggle"><span>▲</span></div>
        <div id="tablet-container">
            <div id="tablet-ui">
                <div id="t-date">пн, 8 марта, 2012 год</div>
                <div id="t-time">0:00</div>
                <div id="t-power">100%</div>
            </div>
        </div>
    </div>

    <div id="screamer"></div>
    <div id="win-screen">6:00 AM<br><br>Вы выжили! Демо-версия окончена.</div>
</div>

<script>
    const sfxOffice = new Audio("https://www.dropbox.com/scl/fi/stbompykujm2unodwnyxf/fnaf-1-office-running-sfx-made-with-Voicemod.mp3?rlkey=f6gjk8dcqyr9ex08vg3fgvcn2&st=rgmq6egu&raw=1");
    const sfxDoor = new Audio("https://www.dropbox.com/scl/fi/xqd8ophfm1rxtq4j9q2yb/SFXBible_12478.ogg.mp3?rlkey=tijiekcxqkb2ntc6bsnc5wtxf&st=l16h1bxc&raw=1");
    const sfxScreamer = new Audio("https://www.dropbox.com/scl/fi/c7gp7m5v3nrrs93yt3n1d/2_5312502910221850618.ogg?rlkey=2a19kt5nzp9uzd3we6qh059n1&st=nciqj38h&raw=1");
    const sfxRuslanAtDoor = new Audio("https://www.dropbox.com/scl/fi/817w1oi32u4dpnpwmho6i/fnaf-animatronic-at-door-noise-made-with-Voicemod.mp3?rlkey=v7in8p6d6xoddfrexn8jidwyb&st=4n1pkg8x&raw=1");

    let power = 100, hour = 0, ticks = 0;
    let door = false, tablet = false, dead = false, win = false;
    let ruslan = "none", rTimer = 0;

    setTimeout(() => document.getElementById("disc-text").style.display = "block", 1000);

    document.getElementById("disclaimer").onclick = () => {
        document.getElementById("disclaimer").style.display = "none";
        document.getElementById("game-container").style.display = "block";
        sfxOffice.loop = true; sfxOffice.play();
        setInterval(loop, 100);
    };

    document.getElementById("door-btn").onclick = () => {
        if (dead) return;
        door = !door;
        sfxDoor.currentTime = 0; sfxDoor.play();
    };

    document.getElementById("tablet-toggle").onclick = () => {
        if (dead) return;
        tablet = !tablet;
        document.getElementById("tablet-container").classList.toggle("open", tablet);
    };

    function loop() {
        if (dead || win) return;

        ticks++;
        if (ticks >= 600) { // 1 час = 60 сек
            ticks = 0; hour++;
            document.getElementById("t-time").innerText = hour + ":00";
            if (hour >= 6) return doWin();
        }

        // Энергия
        power -= door ? (1/30) : (1/60);
        if (power <= 0) doScreamer();
        document.getElementById("t-power").innerText = Math.floor(power) + "%";

        // Руслан
        if (ruslan === "none" && ticks % 50 === 0 && Math.random() < 0.12) {
            ruslan = "door"; rTimer = 0;
            sfxRuslanAtDoor.play();
        }

        if (ruslan === "door") {
            if (door) { ruslan = "wait"; rTimer = 0; }
            else if (++rTimer >= 28) doScreamer();
        } else if (ruslan === "wait") {
            if (++rTimer >= 50) ruslan = "none";
            if (!door) doScreamer();
        }

        render();
    }

    function render() {
        const bg = document.getElementById("office-bg");
        if (ruslan === "door") bg.style.backgroundImage = "url('https://www.dropbox.com/scl/fi/3uy3kw9cjd1e4swht6lcq/Picsart_26-03-02_21-00-43-622.jpg?rlkey=hmb9kx8rj1d3fwoaf0trtatub&st=vcyflxim&raw=1')";
        else if (ruslan === "wait") bg.style.backgroundImage = "url('https://www.dropbox.com/scl/fi/4ahfp344b9ndavaei2ccj/Picsart_26-03-02_21-01-37-603.jpg?rlkey=0ei5oabrqh65n8o67x87s3jh5&st=k6kwbi43&raw=1')";
        else if (door) bg.style.backgroundImage = "url('https://www.dropbox.com/scl/fi/escsy85g9yk4wnryxgr17/Picsart_26-03-02_20-59-41-179.jpg?rlkey=umbwcrkmaac1qau73ae4e7wg7&st=ledcg75e&raw=1')";
        else bg.style.backgroundImage = "url('https://www.dropbox.com/scl/fi/cf1lv5tq2m8bey4e1asnd/Picsart_26-03-02_20-56-34-197.jpg?rlkey=nh08pgwtxjlm3zcdlfpk0tfy0&st=lxi83wwu&raw=1')";
    }

    function doScreamer() {
        if (dead) return; dead = true;
        document.getElementById("screamer").style.display = "block";
        document.getElementById("screamer").classList.add("shake");
        sfxScreamer.play();
        setTimeout(() => location.reload(), 3000);
    }

    function doWin() {
        win = true;
        document.getElementById("game-container").style.display = "none";
        document.getElementById("win-screen").style.display = "flex";
        setTimeout(() => location.reload(), 5000);
    }
</script>
</body>
</html>
